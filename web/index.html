<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Orchestrator</title>
<style>
  :root {
    --bg: #0b0c0f;
    --panel: #15171e;
    --border: #2a2d38;
    --text: #c9cdd9;
    --dim: #6b7280;
    --accent: #60a5fa;
    --success: #34d399;
    --warning: #fbbf24;
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(11,12,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  h1 { margin: 0; font-size: 1.25rem; letter-spacing: -0.02em; }
  .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
  .dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
  main {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 1.5rem;
    max-width: 1600px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
  .sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 1rem;
  }
  .panel h2 {
    margin: 0 0 0.75rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
  }
  .spawn-form { display: flex; flex-direction: column; gap: 0.625rem; }
  label {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: -0.25rem;
  }
  input, select, button, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.625rem;
    border-radius: 0.375rem;
    font: inherit;
    font-size: 0.875rem;
  }
  select:invalid, select option:first-child { color: var(--dim); }
  button {
    cursor: pointer;
    background: var(--accent);
    border-color: var(--accent);
    color: #0b0c0f;
    font-weight: 600;
  }
  button:hover { filter: brightness(1.1); }
  button.secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
  button.secondary:hover { background: rgba(255,255,255,0.05); }
  button.danger {
    background: rgba(248,113,113,0.15);
    border-color: var(--error);
    color: var(--error);
  }
  button.danger:hover { background: rgba(248,113,113,0.25); }
  .agents {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .agent {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
  }
  .agent.streaming { border-color: rgba(96,165,250,0.4); }
  .agent-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .agent-name { font-weight: 600; font-size: 0.9375rem; }
  .badge {
    font-size: 0.6875rem;
    padding: 0.125rem 0.5rem;
    border-radius: 999px;
    background: var(--border);
    color: var(--dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge.streaming { background: rgba(96,165,250,0.15); color: var(--accent); }
  .badge.idle { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge.error, .badge.exited { background: rgba(248,113,113,0.15); color: var(--error); }
  .agent-meta {
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .terminal {
    flex: 1;
    padding: 0.75rem 1rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 0.8125rem;
    line-height: 1.6;
    overflow: auto;
    max-height: 280px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }
  .agent-actions {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
  }
  .agent-actions input { flex: 1; }
  #global-log {
    max-height: 240px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.75rem;
    color: var(--dim);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .log-line { border-left: 2px solid var(--border); padding-left: 0.5rem; }
  .log-line.info { border-color: var(--accent); }
  .log-line.success { border-color: var(--success); }
  .log-line.warn { border-color: var(--warning); }
  .log-line.error { border-color: var(--error); }
</style>
</head>
<body>
<header>
  <h1>🧠 Pi Orchestrator</h1>
  <div class="status"><span class="dot" id="conn-dot"></span> <span id="conn-text">Disconnected</span></div>
</header>
<main>
  <aside class="sidebar">
    <div class="panel">
      <h2>Spawn Agent</h2>
      <form class="spawn-form" id="spawn-form">
        <label for="spawn-name">Name</label>
        <input id="spawn-name" placeholder="e.g. lead, scout" required autocomplete="off">

        <label for="spawn-parent">Parent</label>
        <select id="spawn-parent">
          <option value="self">self (root / orchestrator)</option>
        </select>

        <label for="spawn-type">Agent Type</label>
        <select id="spawn-type">
          <option value="">-- select type --</option>
        </select>

        <label for="spawn-model">Model Override</label>
        <input id="spawn-model" placeholder="e.g. claude-sonnet-4, kimi-k2.6" autocomplete="off">
        <span style="font-size:0.75rem;color:var(--dim);">Optional. Overrides the default model for this agent type.</span>

        <label>Extensions</label>
        <div id="spawn-extensions" style="display:flex;flex-direction:column;gap:0.375rem;font-size:0.875rem;max-height:120px;overflow:auto;">
          <span style="color:var(--dim);font-size:0.75rem;">Loading…</span>
        </div>

        <button type="submit" style="margin-top:0.25rem;">Spawn</button>
      </form>
    </div>
    <div class="panel">
      <h2>Event Log</h2>
      <div id="global-log"></div>
    </div>
  </aside>
  <section>
    <div class="panel" style="min-height: 60vh;">
      <h2>Active Agents</h2>
      <div id="agents"><div class="empty">No agents running.</div></div>
    </div>
  </section>
</main>
<script type="module" src="/dashboard.js"></script>
</body>
</html>
